version: "3.9"

services:
  app:
    build: .
    container_name: fintech-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fintech
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    command: pnpm dev

  mongo:
    image: mongo:6
    container_name: fintech-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: fintech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: